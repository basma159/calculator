<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="calculator">
        <div id="reslut1"></div>
        <div class="container">

            <button id="btn-reset1">CL</button>
            <button id="btn-reset2">DL</button>
            <button id="btn-re-div">%</button>
            <button id="btn-div">/</button>
            <button id="btn7">7</button>
            <button id="btn8">8</button>
            <button id="btn9">9</button>
            <button id="btn-mul">*</button>
            <button id="btn4">4</button>
            <button id="btn5">5</button>
            <button id="btn6">6</button>
            <button id="btn-sum">+</button>
            <button id="btn1">1</button>
            <button id="btn2">2</button>
            <button id="btn3">3</button>
            <button id="btn-sub">-</button>
            <button id="btn0">0</button>
            <button id="btn00">00</button>
            <button id="btn">.</button>
            <button id="btn-equal">=</button>

        </div><!-- calcuator -->
    </div><!-- container -->
    <script src="js/script.js"></script>
</body>

</html>
